<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Teller Connect — dough-flow-db</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; }
    button { font-size: 16px; padding: 10px 20px; cursor: pointer; }
    pre { background: #f4f4f4; padding: 12px; border-radius: 6px; white-space: pre-wrap; word-break: break-all; }
    .hint { color: #666; font-size: 14px; }
    label { display: block; margin: 12px 0 4px; }
    input { width: 100%; padding: 6px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Teller Connect</h1>
  <p class="hint">Click Connect, log into your bank, and the access token will appear below. Copy it into <code>.env</code> as <code>TELLER_TOKEN_&lt;BANK&gt;</code>.</p>

  <label for="appId">Application ID</label>
  <input id="appId" value="app_prj2jpt9n65e5u2j0a000">

  <label for="env">Environment</label>
  <select id="env">
    <option value="sandbox">sandbox</option>
    <option value="development" selected>development</option>
  </select>

  <p><button id="connectBtn">Connect a bank</button></p>

  <h3>Result</h3>
  <pre id="result">(nothing yet)</pre>

  <script src="https://cdn.teller.io/connect/connect.js"></script>
  <script>
    document.getElementById('connectBtn').addEventListener('click', () => {
      const teller = TellerConnect.setup({
        applicationId: document.getElementById('appId').value,
        environment: document.getElementById('env').value,
        onInit: () => console.log('Teller Connect initialized'),
        onSuccess: (enrollment) => {
          document.getElementById('result').textContent = JSON.stringify(enrollment, null, 2);
        },
        onExit: () => console.log('User closed Teller Connect'),
        onFailure: (err) => {
          document.getElementById('result').textContent = 'ERROR: ' + JSON.stringify(err, null, 2);
        }
      });
      teller.open();
    });
  </script>
</body>
</html>
